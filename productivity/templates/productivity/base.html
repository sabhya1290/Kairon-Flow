<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>{% block title %}Kairon Flow{% endblock %}</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#a078ff",
                        "primary": "#d0bcff",
                        "surface-container-highest": "#2d3449",
                        "on-tertiary": "#68000a",
                        "secondary-fixed-dim": "#adc6ff",
                        "tertiary-fixed-dim": "#ffb3ad",
                        "on-background": "#dae2fd",
                        "on-primary-fixed-variant": "#5516be",
                        "outline-variant": "#494454",
                        "secondary": "#adc6ff",
                        "tertiary-container": "#ff5451",
                        "on-tertiary-fixed": "#410004",
                        "inverse-surface": "#dae2fd",
                        "tertiary-fixed": "#ffdad7",
                        "background": "#0b1326",
                        "surface-tint": "#d0bcff",
                        "error-container": "#93000a",
                        "on-surface-variant": "#cbc3d7",
                        "on-secondary-container": "#e6ecff",
                        "primary-fixed": "#e9ddff",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed": "#23005c",
                        "on-surface": "#dae2fd",
                        "on-tertiary-fixed-variant": "#930013",
                        "on-secondary": "#002e6a",
                        "inverse-on-surface": "#283044",
                        "surface-container-high": "#222a3d",
                        "on-secondary-fixed": "#001a42",
                        "surface-container-lowest": "#060e20",
                        "outline": "#958ea0",
                        "surface-container": "#171f33",
                        "surface-container-low": "#131b2e",
                        "on-primary-container": "#340080",
                        "on-primary": "#3c0091",
                        "tertiary": "#ffb3ad",
                        "on-tertiary-container": "#5c0008",
                        "error": "#ffb4ab",
                        "on-error": "#690005",
                        "surface-variant": "#2d3449",
                        "inverse-primary": "#6d3bd7",
                        "primary-fixed-dim": "#d0bcff",
                        "surface-dim": "#0b1326",
                        "secondary-container": "#0566d9",
                        "secondary-fixed": "#d8e2ff",
                        "on-secondary-fixed-variant": "#004395",
                        "surface-bright": "#31394d",
                        "surface": "#0b1326"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "gutter": "24px",
                        "md": "16px",
                        "sm": "8px",
                        "xs": "4px",
                        "base": "4px",
                        "container-max": "1440px",
                        "lg": "24px",
                        "xl": "40px"
                    },
                    fontFamily: {
                        "headline-lg-mobile": ["Inter"],
                        "display-lg": ["Inter"],
                        "label-sm": ["JetBrains Mono"],
                        "title-md": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    fontSize: {
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "title-md": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    
    <!-- Material Symbols and Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    
    <style>
        .glow-text {
            text-shadow: 0 0 10px rgba(160, 120, 255, 0.4);
        }
        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        .row-hover:hover {
            background-color: rgba(30, 41, 59, 0.5);
            border-left-color: #d0bcff;
        }
        .glow-btn:hover {
            box-shadow: 0 0 15px rgba(208, 188, 255, 0.3);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen">
    {% block body_content %}{% endblock %}
</body>
</html>
