version: '3.9'
services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://kairon:kairon_dev_password@db:5432/kairon_flow
    env_file:
      - .env
    depends_on:
      - db
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kairon_flow
      POSTGRES_USER: kairon
      POSTGRES_PASSWORD: kairon_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
